services:
  openchamber:
    build:
      context: .
    volumes:
      - "./opencode-config:/home/.config/opencode"
      - "./opencode-data:/home/.local/share/opencode"
      - "./opencode-state:/home/.local/state/opencode"
      - "./opencode-cache:/home/.cache/opencode"
      - "./openchamber-config:/home/.config/openchamber"
      - "${REPOSITORIES_PATH:-./repositories}:/home/repositories"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      OPENCHAMBER_PORT: ${OPENCHAMBER_PORT:-5200}
      OPENCODE_BINARY: /home/.opencode/bin/opencode
      UI_PASSWORD: ${UI_PASSWORD:-}
    restart: unless-stopped
    network_mode: host
