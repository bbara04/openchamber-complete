services:
  opencode-chamber:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./repositories:/root/repositories"
    environment:
      - UI_PASSWORD=${UI_PASSWORD:-}
      - OPENCHAMBER_HOST=0.0.0.0
    working_dir: /root/repositories
    restart: unless-stopped
