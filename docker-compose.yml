services:
  opencode-chamber:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "3000:3000"
    volumes:
      - "./opencode-config:/home/.config/opencode"
      - "./openchamber-config:/home/.config/openchamber"
      - "../codes:/home/repositories"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - UI_PASSWORD=
      - OPENCHAMBER_HOST=0.0.0.0
    restart: unless-stopped
    network_mode: host
